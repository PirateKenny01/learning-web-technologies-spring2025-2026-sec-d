<!DOCTYPE html>
<html>
<head>
    <title>Tic-Tac-Toe Game</title>
    
</head>
<body>
    <div class="container">
        <h1>Tic-Tac-Toe</h1>
        
       
        <div class="status-section">
            <div class="current-status">
                <p id="status">Player X's Turn</p>
            </div>
            
            
            <div class="score-display">
                <div class="score-item">
                    <span class="player-label">X Wins:</span>
                    <span id="scoreX" class="score">0</span>
                </div>
                <div class="score-item">
                    <span class="player-label">Draws:</span>
                    <span id="scoreDraw" class="score">0</span>
                </div>
                <div class="score-item">
                    <span class="player-label">O Wins:</span>
                    <span id="scoreO" class="score">0</span>
                </div>
            </div>
        </div>

        

        
        <div class="button-section">
            <button id="resetBtn" class="btn btn-primary">Reset Game</button>
            <button id="clearScoreBtn" class="btn btn-secondary">Clear Score</button>
        </div>
    </div>

    
</body>
</html>
